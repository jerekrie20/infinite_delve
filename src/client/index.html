<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Infinite Delve</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <!-- The HUD is rendered on the Phaser canvas (HudScene). Only the modal
           panels below remain HTML overlays. -->
      <div id="daily-panel" class="panel-backdrop">
        <div class="panel">
          <button id="daily-close" class="panel-close" aria-label="Close">✕</button>
          <div id="daily-content"></div>
        </div>
      </div>
      <div id="gear-panel" class="panel-backdrop">
        <div class="panel">
          <button id="gear-close" class="panel-close" aria-label="Close">✕</button>
          <div id="gear-content"></div>
        </div>
      </div>
      <div id="menu-panel" class="panel-backdrop">
        <div class="panel">
          <button id="menu-close" class="panel-close" aria-label="Close">✕</button>
          <div class="panel-title">Menu</div>
          <div class="panel-day">More</div>
          <div class="menu-list">
            <button id="btn-daily" class="menu-item">📊 Daily &amp; Leaderboard</button>
            <button class="menu-item" disabled>⚙️ Settings <span class="soon">soon</span></button>
            <button class="menu-item" disabled>📜 Stats <span class="soon">soon</span></button>
            <button id="btn-reset" class="menu-item">🗑️ Reset hero</button>
          </div>
        </div>
      </div>
      <div id="base-panel" class="panel-backdrop">
        <div class="panel">
          <button id="base-close" class="panel-close" aria-label="Close">✕</button>
          <div class="panel-title">Base</div>
          <div class="panel-day">Your Base</div>
          <div class="panel-empty">
            Your home base is coming soon — upgrades, crafting, and stash storage
            will live here.
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gear Editor — Infinite Delve</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #17111f; color: #ece7f5; }
      header {
        display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: center; padding: 10px 14px;
        background: #1c1430; position: sticky; top: 0; z-index: 5; border-bottom: 1px solid rgba(255,255,255,0.12);
      }
      header h1 { font-size: 15px; margin: 0 6px 0 0; }
      button {
        padding: 6px 11px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; font-size: 13px;
      }
      button:hover { background: rgba(255,255,255,0.16); }
      button.primary { background: #37b04f; border-color: #37b04f; font-weight: bold; }
      button.mini { padding: 2px 8px; font-size: 12px; }
      .tabs { display: flex; gap: 4px; }
      .tab { background: rgba(255,255,255,0.05); }
      .tab.active { background: #4aa3ff; border-color: #4aa3ff; font-weight: bold; }
      #status { font-size: 12px; color: #9d8fc0; margin-left: auto; }
      #status.err { color: #ff6b6b; }
      main { padding: 14px; }
      .page { display: none; } .page.active { display: block; }
      .hint { font-size: 12px; color: #9d8fc0; margin: 0 0 12px; max-width: 900px; line-height: 1.5; }
      .card {
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px; padding: 12px; margin-bottom: 10px; max-width: 900px;
      }
      .card.bad { border-color: #ff6b6b; }
      .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .card-head .title { font-weight: bold; font-size: 14px; }
      .row { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: flex-end; margin-bottom: 8px; }
      label { font-size: 11px; color: #cbc3dd; display: flex; flex-direction: column; gap: 3px; }
      label.inline { flex-direction: row; align-items: center; gap: 5px; }
      input, select {
        padding: 5px 8px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.2);
        background: #120c1c; color: #fff; font-size: 13px;
      }
      input.id { width: 110px; } input.name { width: 150px; } input.num { width: 62px; }
      .pool { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 4px; }
      .pool label { flex-direction: row; align-items: center; gap: 4px; font-size: 12px; }
      .pill { font-size: 11px; color: #9d8fc0; font-weight: normal; }
      .badge { font-size: 10px; padding: 1px 5px; border-radius: 6px; background: rgba(255,180,60,0.2); color: #ffb84d; }
      .line-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
      .err-lines { color: #ff9b9b; font-size: 11px; margin-top: 6px; white-space: pre-wrap; }
      details { margin-top: 16px; max-width: 900px; } summary { cursor: pointer; color: #9d8fc0; font-size: 13px; }
      .out-block { margin-top: 10px; }
      .out-block .row { margin-bottom: 4px; }
      textarea {
        width: 100%; height: 200px; background: #0c0812; color: #b7e5c2;
        border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 10px;
        font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; white-space: pre;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⚔️ Gear Editor</h1>
      <div class="tabs">
        <button class="tab active" data-tab="bases">Bases</button>
        <button class="tab" data-tab="sets">Sets</button>
        <button class="tab" data-tab="uniques">Uniques</button>
        <button class="tab" data-tab="stats">Stat catalog</button>
      </div>
      <button id="add">+ Add</button>
      <button id="reset">↺ Reset to committed</button>
      <button class="primary" id="regen">⟳ Regen TS ↓</button>
      <span id="status"></span>
    </header>

    <main>
      <p class="hint" id="hint"></p>
      <div class="page active" id="page-bases"></div>
      <div class="page" id="page-sets"></div>
      <div class="page" id="page-uniques"></div>
      <div class="page" id="page-stats"></div>

      <details open>
        <summary>Generated TS — paste each block over the matching declaration in its content module</summary>
        <div class="out-block"><div class="row"><strong>items.ts → BASES</strong><button class="mini" data-copy="out-bases">Copy</button></div><textarea id="out-bases" readonly></textarea></div>
        <div class="out-block"><div class="row"><strong>sets.ts → SETS</strong><button class="mini" data-copy="out-sets">Copy</button></div><textarea id="out-sets" readonly></textarea></div>
        <div class="out-block"><div class="row"><strong>uniques.ts → UNIQUES</strong><button class="mini" data-copy="out-uniques">Copy</button></div><textarea id="out-uniques" readonly></textarea></div>
        <div class="out-block"><div class="row"><strong>stats.ts → StatId + STATS</strong><button class="mini" data-copy="out-stats">Copy</button></div><textarea id="out-stats" readonly></textarea></div>
      </details>
    </main>

    <script type="module">
      import { STATS, STAT_IDS, DERIVED_IDS } from '../src/shared/content/stats.ts';
      import { BASES, RARITIES, AFFIXES_BY_RARITY, VALID_SLOTS } from '../src/shared/content/items.ts';
      import { SETS } from '../src/shared/content/sets.ts';
      import { UNIQUES } from '../src/shared/content/uniques.ts';

      const LS_KEY = 'delve-gear-editor-v2';
      const $ = (id) => document.getElementById(id);
      const clone = (v) => JSON.parse(JSON.stringify(v));
      const RARITY_IDS = RARITIES.map((r) => r.id);
      const SNAKE = /^[a-z0-9_]+$/;

      const HINTS = {
        bases: 'Base items = one per drop slot. `primary` always rolls; `pool` is the affix menu (rarity picks how many). Set membership lives on the SET now, not here.',
        sets: 'A set is defined by its member bases + a rarity (set items drop at that tier, colored green). Bonuses apply cumulatively as thresholds are met.',
        uniques: 'Named items with signature lines rolled in tight [min,max] bands, a drop weight (weighted entry in the loot table), and an optional set. Render gold.',
        stats: 'The affix catalog = the stat registry. flat/pct stats work with zero code. A behavioral stat needs a LaneScene hook — author it now, leave "implemented" off, and the roller skips it until the hook is coded.',
      };

      // ---- state ----------------------------------------------------------
      // Uniques edit their bands as a `lines:[{stat,min,max}]` array (converted
      // to/from the {stat:[min,max]} record at seed/serialize time).
      function committed() {
        return {
          stats: clone(STATS),
          bases: clone(BASES),
          sets: clone(SETS),
          uniques: UNIQUES.map((u) => ({
            ...clone(u),
            lines: Object.entries(u.stats).map(([stat, [min, max]]) => ({ stat, min, max })),
          })),
        };
      }
      let state;
      try { state = JSON.parse(localStorage.getItem(LS_KEY) || 'null') || committed(); }
      catch { state = committed(); }
      // Back-fill lines if an older cache lacked them.
      state.uniques.forEach((u) => { if (!u.lines) u.lines = Object.entries(u.stats || {}).map(([stat, b]) => ({ stat, min: b[0], max: b[1] })); });

      let tab = 'bases';
      const persist = () => localStorage.setItem(LS_KEY, JSON.stringify(state));

      // ---- live vocab (reads STATE so catalog edits propagate) ------------
      const statIds = () => Object.keys(state.stats);
      const flatStatIds = () => statIds().filter((id) => state.stats[id].op === 'flat');
      const isImpl = (id) => state.stats[id] && state.stats[id].implemented !== false;
      const baseIds = () => state.bases.map((b) => b.id);
      const setIds = () => Object.keys(state.sets);

      // ---- validation -----------------------------------------------------
      function validate() {
        const e = { bases: {}, sets: {}, uniques: {}, stats: {} };
        const known = new Set(statIds());
        const bids = new Set();
        state.bases.forEach((b, i) => {
          const x = [];
          if (!SNAKE.test(b.id || '')) x.push('id must be lower_snake');
          if (bids.has(b.id)) x.push('duplicate id'); bids.add(b.id);
          if (!VALID_SLOTS.includes(b.slot)) x.push('invalid slot');
          if (!flatStatIds().includes(b.primary)) x.push('primary must be a flat stat');
          if (!b.pool?.length) x.push('pool is empty');
          if (b.pool?.includes(b.primary)) x.push('pool includes the primary');
          if (b.pool?.some((s) => !known.has(s))) x.push('pool has an unknown stat');
          if (x.length) e.bases[i] = x;
        });
        Object.entries(state.sets).forEach(([id, s]) => {
          const x = [];
          if (id !== s.id) x.push('key != id');
          if (!SNAKE.test(s.id || '')) x.push('id must be lower_snake');
          if (!RARITY_IDS.includes(s.rarity)) x.push('invalid rarity');
          if (!s.members?.length) x.push('no members');
          if (s.members?.some((m) => !baseIds().includes(m))) x.push('member is not a base id');
          (s.bonuses || []).forEach((bn, j) => {
            if (!(bn.pieces >= 1)) x.push(`bonus ${j}: pieces >= 1`);
            if (!known.has(bn.stat)) x.push(`bonus ${j}: unknown stat`);
            if (typeof bn.val !== 'number') x.push(`bonus ${j}: val must be a number`);
          });
          if (x.length) e.sets[id] = x;
        });
        const uids = new Set();
        state.uniques.forEach((u, i) => {
          const x = [];
          if (!SNAKE.test(u.id || '')) x.push('id must be lower_snake');
          if (uids.has(u.id)) x.push('duplicate id'); uids.add(u.id);
          if (!VALID_SLOTS.includes(u.slot)) x.push('invalid slot');
          if (!baseIds().includes(u.base)) x.push('base is not a base id');
          if (!RARITY_IDS.includes(u.rarity)) x.push('invalid rarity');
          if (!(u.dropWeight >= 0)) x.push('dropWeight >= 0');
          if (u.set && !state.sets[u.set]) x.push('set does not exist');
          if (!u.lines?.length) x.push('no stat lines');
          u.lines?.forEach((ln, j) => {
            if (!known.has(ln.stat)) x.push(`line ${j}: unknown stat`);
            if (!(ln.min <= ln.max)) x.push(`line ${j}: min <= max`);
          });
          if (x.length) e.uniques[i] = x;
        });
        Object.entries(state.stats).forEach(([id, s]) => {
          const x = [];
          if (id !== s.id) x.push('key != id');
          if (!SNAKE.test(s.id || '')) x.push('id must be lower_snake');
          if (!DERIVED_IDS.includes(s.target)) x.push(`target must be a derived id (${DERIVED_IDS.join('/')})`);
          if (!['flat', 'pct'].includes(s.op)) x.push('op must be flat|pct');
          if (!['flat', 'behavioral'].includes(s.kind)) x.push('kind must be flat|behavioral');
          if (typeof s.perBudget !== 'number') x.push('perBudget must be a number');
          if (typeof s.value !== 'number') x.push('value must be a number');
          if (s.op === 'pct' && !(Array.isArray(s.band) && s.band.length === 2)) x.push('pct stat needs a band [min,max]');
          if (x.length) e.stats[id] = x;
        });
        return e;
      }

      // ---- TS serialization ----------------------------------------------
      const q = (s) => `'${String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'")}'`;
      const arr = (a, f = q) => `[${a.map(f).join(', ')}]`;
      // ordered [key, value|undefined] pairs → inline TS object (undefined dropped)
      const obj = (pairs) => `{ ${pairs.filter(([, v]) => v !== undefined).map(([k, v]) => `${k}: ${v}`).join(', ')} }`;

      function basesTs() {
        const rows = state.bases.map((b) =>
          '  ' + obj([['id', q(b.id)], ['name', q(b.name)], ['slot', q(b.slot)], ['primary', q(b.primary)], ['pool', arr(b.pool)]]) + ','
        );
        return `export const BASES: BaseItem[] = [\n${rows.join('\n')}\n];`;
      }
      function setsTs() {
        const rows = Object.values(state.sets).map((s) => {
          const bonuses = arr(s.bonuses, (bn) => obj([['pieces', bn.pieces], ['stat', q(bn.stat)], ['val', bn.val]]));
          return `  ${s.id}: {\n    id: ${q(s.id)},\n    name: ${q(s.name)},\n    rarity: ${q(s.rarity)},\n    members: ${arr(s.members)},\n    bonuses: ${bonuses},\n  },`;
        });
        return `export const SETS: Record<string, SetDef> = {\n${rows.join('\n')}\n};`;
      }
      function uniquesTs() {
        const rows = state.uniques.map((u) => {
          const stats = '{ ' + u.lines.map((ln) => `${ln.stat}: [${ln.min}, ${ln.max}]`).join(', ') + ' }';
          return '  ' + obj([
            ['id', q(u.id)], ['name', q(u.name)], ['slot', q(u.slot)], ['base', q(u.base)],
            ['rarity', q(u.rarity)], ['stats', stats], ['dropWeight', u.dropWeight],
            ['set', u.set ? q(u.set) : undefined],
          ]) + ',';
        });
        return `export const UNIQUES: UniqueItem[] = [\n${rows.join('\n')}\n];`;
      }
      function statsTs() {
        const ids = statIds();
        const union = `export type StatId =\n${ids.map((id, i) => `  ${i === 0 ? '| ' : '| '}${q(id)}`).join('\n')};`;
        const rows = ids.map((id) => {
          const s = state.stats[id];
          return '  ' + `${id}: ` + obj([
            ['id', q(s.id)], ['name', q(s.name)], ['abbr', q(s.abbr)],
            ['pct', s.pct ? 'true' : undefined],
            ['target', q(s.target)], ['op', q(s.op)], ['perBudget', s.perBudget],
            ['band', Array.isArray(s.band) ? `[${s.band[0]}, ${s.band[1]}]` : undefined],
            ['value', s.value], ['kind', q(s.kind)],
            ['max', s.max !== undefined && s.max !== null && s.max !== '' ? s.max : undefined],
            ['implemented', s.implemented === false ? 'false' : undefined],
          ]) + ',';
        });
        return `${union}\n\nexport const STATS: Record<StatId, StatDef> = {\n${rows.join('\n')}\n};`;
      }
      function regen() {
        $('out-bases').value = basesTs();
        $('out-sets').value = setsTs();
        $('out-uniques').value = uniquesTs();
        $('out-stats').value = statsTs();
      }

      // ---- render helpers -------------------------------------------------
      const opts = (list, sel, label = (x) => x) =>
        list.map((v) => `<option value="${v}" ${v === sel ? 'selected' : ''}>${label(v)}</option>`).join('');
      const noneOpt = (sel) => `<option value="" ${!sel ? 'selected' : ''}>— none —</option>`;

      function renderBases(errs) {
        return state.bases.map((b, i) => {
          const err = errs.bases[i];
          const pool = statIds().map((s) => {
            const on = b.pool?.includes(s), primary = s === b.primary;
            const impl = isImpl(s) ? '' : ' <span class="badge">staged</span>';
            return `<label><input type="checkbox" data-pool="${i}" value="${s}" ${on ? 'checked' : ''} ${primary ? 'disabled' : ''}/> ${s}${impl}</label>`;
          }).join('');
          const counts = RARITIES.map((r) => `${r.name[0]}:${Math.min(AFFIXES_BY_RARITY[r.id], b.pool?.length ?? 0)}`).join(' ');
          return card(b.name || '(unnamed)', b.slot, `del-base=${i}`, err,
            `<div class="row">` +
            fld('id', `<input class="id" data-bf="id" data-i="${i}" value="${b.id ?? ''}"/>`) +
            fld('name', `<input class="name" data-bf="name" data-i="${i}" value="${b.name ?? ''}"/>`) +
            fld('slot', `<select data-bf="slot" data-i="${i}">${opts(VALID_SLOTS, b.slot)}</select>`) +
            fld('primary', `<select data-bf="primary" data-i="${i}">${opts(flatStatIds(), b.primary)}</select>`) +
            `</div><div class="pill">affix pool — rarity→count: ${counts}</div><div class="pool">${pool}</div>`);
        }).join('') || empty('No bases.');
      }

      function renderSets(errs) {
        return Object.values(state.sets).map((s) => {
          const err = errs.sets[s.id];
          const members = baseIds().map((bid) =>
            `<label><input type="checkbox" data-member="${s.id}" value="${bid}" ${s.members?.includes(bid) ? 'checked' : ''}/> ${bid}</label>`
          ).join('') || '<span class="pill">no bases to add</span>';
          const bonuses = (s.bonuses || []).map((bn, j) =>
            `<div class="line-row">` +
            fld('pieces', `<input class="num" type="number" min="1" data-snf="pieces" data-sid="${s.id}" data-j="${j}" value="${bn.pieces}"/>`) +
            fld('stat', `<select data-snf="stat" data-sid="${s.id}" data-j="${j}">${opts(statIds(), bn.stat)}</select>`) +
            fld('val', `<input class="num" type="number" data-snf="val" data-sid="${s.id}" data-j="${j}" value="${bn.val}"/>`) +
            `<button class="mini" data-del-bonus="${s.id}:${j}">✕</button></div>`
          ).join('');
          return card(s.name || '(unnamed)', s.id, `del-set=${s.id}`, err,
            `<div class="row">` +
            fld('id', `<input class="id" data-setf="id" data-sid="${s.id}" value="${s.id}"/>`) +
            fld('name', `<input class="name" data-setf="name" data-sid="${s.id}" value="${s.name ?? ''}"/>`) +
            fld('rarity', `<select data-setf="rarity" data-sid="${s.id}">${opts(RARITY_IDS, s.rarity)}</select>`) +
            `</div><div class="pill">members</div><div class="pool">${members}</div>` +
            `<div class="pill" style="margin-top:6px">bonuses</div>${bonuses}<button class="mini" data-add-bonus="${s.id}">+ bonus</button>`);
        }).join('') || empty('No sets.');
      }

      function renderUniques(errs) {
        return state.uniques.map((u, i) => {
          const err = errs.uniques[i];
          const lines = (u.lines || []).map((ln, j) =>
            `<div class="line-row">` +
            fld('stat', `<select data-ulf="stat" data-i="${i}" data-j="${j}">${opts(statIds(), ln.stat)}</select>`) +
            fld('min', `<input class="num" type="number" data-ulf="min" data-i="${i}" data-j="${j}" value="${ln.min}"/>`) +
            fld('max', `<input class="num" type="number" data-ulf="max" data-i="${i}" data-j="${j}" value="${ln.max}"/>`) +
            `<button class="mini" data-del-line="${i}:${j}">✕</button></div>`
          ).join('');
          return card(u.name || '(unnamed)', u.slot, `del-unique=${i}`, err,
            `<div class="row">` +
            fld('id', `<input class="id" data-uf="id" data-i="${i}" value="${u.id ?? ''}"/>`) +
            fld('name', `<input class="name" data-uf="name" data-i="${i}" value="${u.name ?? ''}"/>`) +
            fld('slot', `<select data-uf="slot" data-i="${i}">${opts(VALID_SLOTS, u.slot)}</select>`) +
            fld('base', `<select data-uf="base" data-i="${i}">${opts(baseIds(), u.base)}</select>`) +
            fld('rarity', `<select data-uf="rarity" data-i="${i}">${opts(RARITY_IDS, u.rarity)}</select>`) +
            fld('dropWeight', `<input class="num" type="number" step="0.1" data-uf="dropWeight" data-i="${i}" value="${u.dropWeight}"/>`) +
            fld('set', `<select data-uf="set" data-i="${i}">${noneOpt(u.set)}${opts(setIds(), u.set)}</select>`) +
            `</div><div class="pill">signature lines (rolled in [min,max])</div>${lines}<button class="mini" data-add-line="${i}">+ line</button>`);
        }).join('') || empty('No uniques.');
      }

      function renderStats(errs) {
        return Object.values(state.stats).map((s) => {
          const err = errs.stats[s.id];
          const pctRow = s.op === 'pct'
            ? fld('band min', `<input class="num" type="number" data-stf="bandMin" data-sid="${s.id}" value="${s.band?.[0] ?? ''}"/>`) +
              fld('band max', `<input class="num" type="number" data-stf="bandMax" data-sid="${s.id}" value="${s.band?.[1] ?? ''}"/>`)
            : '';
          const behavioralNote = s.kind === 'behavioral' && s.implemented === false
            ? `<div class="pill" style="color:#ffb84d">⚑ staged — needs a LaneScene hook before it rolls onto items</div>` : '';
          return card(s.name || '(unnamed)', `${s.op} → ${s.target}`, `del-stat=${s.id}`, err,
            `<div class="row">` +
            fld('id', `<input class="id" data-stf="id" data-sid="${s.id}" value="${s.id}"/>`) +
            fld('name', `<input class="name" data-stf="name" data-sid="${s.id}" value="${s.name ?? ''}"/>`) +
            fld('abbr', `<input class="num" data-stf="abbr" data-sid="${s.id}" value="${s.abbr ?? ''}"/>`) +
            fld('target', `<select data-stf="target" data-sid="${s.id}">${opts(DERIVED_IDS, s.target)}</select>`) +
            fld('op', `<select data-stf="op" data-sid="${s.id}">${opts(['flat', 'pct'], s.op)}</select>`) +
            fld('kind', `<select data-stf="kind" data-sid="${s.id}">${opts(['flat', 'behavioral'], s.kind)}</select>`) +
            `</div><div class="row">` +
            fld('perBudget', `<input class="num" type="number" step="0.05" data-stf="perBudget" data-sid="${s.id}" value="${s.perBudget}"/>`) +
            fld('value', `<input class="num" type="number" step="0.5" data-stf="value" data-sid="${s.id}" value="${s.value}"/>`) +
            fld('max', `<input class="num" type="number" data-stf="max" data-sid="${s.id}" value="${s.max ?? ''}"/>`) +
            pctRow +
            `<label class="inline"><input type="checkbox" data-stf="pct" data-sid="${s.id}" ${s.pct ? 'checked' : ''}/> show %</label>` +
            `<label class="inline"><input type="checkbox" data-stf="implemented" data-sid="${s.id}" ${s.implemented !== false ? 'checked' : ''}/> implemented</label>` +
            `</div>${behavioralNote}`);
        }).join('') || empty('No stats.');
      }

      const fld = (label, inner) => `<label>${label}${inner}</label>`;
      const empty = (msg) => `<div class="hint">${msg}</div>`;
      function card(title, sub, delAttr, err, body) {
        const [k, v] = delAttr.split('=');
        return `<div class="card${err ? ' bad' : ''}"><div class="card-head"><span class="title">${title} <span class="pill">${sub}</span></span>` +
          `<button class="mini" data-${k}="${v}">✕</button></div>${body}` +
          (err ? `<div class="err-lines">⚠ ${err.join('\n')}</div>` : '') + `</div>`;
      }

      function render() {
        const errs = validate();
        $('hint').textContent = HINTS[tab];
        $('page-bases').innerHTML = tab === 'bases' ? renderBases(errs) : '';
        $('page-sets').innerHTML = tab === 'sets' ? renderSets(errs) : '';
        $('page-uniques').innerHTML = tab === 'uniques' ? renderUniques(errs) : '';
        $('page-stats').innerHTML = tab === 'stats' ? renderStats(errs) : '';
        document.querySelectorAll('.page').forEach((p) => p.classList.toggle('active', p.id === `page-${tab}`));
        const n = ['bases', 'sets', 'uniques', 'stats'].reduce((a, t) => a + Object.keys(errs[t]).length, 0);
        const st = $('status');
        st.textContent = n ? `${n} card(s) with errors · autosaved` : 'valid · autosaved';
        st.className = n ? 'err' : '';
        regen(); persist();
      }

      // ---- events ---------------------------------------------------------
      document.body.addEventListener('input', (e) => {
        const t = e.target, d = t.dataset, i = d.i != null ? +d.i : null;
        const val = t.type === 'number' ? Number(t.value) : t.value;
        if (d.bf != null) { // base field
          const b = state.bases[i]; b[d.bf] = t.value;
          if (d.bf === 'primary') b.pool = (b.pool || []).filter((s) => s !== t.value);
          render();
        } else if (d.setf) { // set id/name/rarity
          const s = state.sets[d.sid];
          if (d.setf === 'id') { rekeySet(d.sid, t.value); }
          else { s[d.setf] = t.value; render(); }
        } else if (d.snf) { // set bonus
          const bn = state.sets[d.sid].bonuses[+d.j];
          bn[d.snf] = d.snf === 'stat' ? t.value : Number(t.value); render();
        } else if (d.uf) { // unique field
          const u = state.uniques[i];
          if (d.uf === 'set') u.set = t.value || undefined;
          else u[d.uf] = t.type === 'number' ? Number(t.value) : t.value;
          render();
        } else if (d.ulf) { // unique line
          const ln = state.uniques[i].lines[+d.j];
          ln[d.ulf] = d.ulf === 'stat' ? t.value : Number(t.value); render();
        } else if (d.stf) { // stat catalog field
          updateStat(d.sid, d.stf, t); render();
        }
      });

      document.body.addEventListener('change', (e) => {
        const t = e.target, d = t.dataset;
        if (d.pool != null) {
          const b = state.bases[+d.pool]; b.pool = b.pool || [];
          if (t.checked) { if (!b.pool.includes(t.value)) b.pool.push(t.value); }
          else b.pool = b.pool.filter((s) => s !== t.value);
          render();
        } else if (d.member != null) {
          const s = state.sets[d.member]; s.members = s.members || [];
          if (t.checked) { if (!s.members.includes(t.value)) s.members.push(t.value); }
          else s.members = s.members.filter((m) => m !== t.value);
          render();
        } else if (d.stf === 'pct' || d.stf === 'implemented') {
          state.stats[d.sid][d.stf] = t.checked; render();
        }
      });

      document.body.addEventListener('click', (e) => {
        const t = e.target, d = t.dataset;
        if (d.tab) { tab = d.tab; document.querySelectorAll('.tab').forEach((x) => x.classList.toggle('active', x.dataset.tab === tab)); render(); }
        else if (d.delBase != null) { state.bases.splice(+d.delBase, 1); render(); }
        else if (d.delSet) { delete state.sets[d.delSet]; render(); }
        else if (d.delUnique != null) { state.uniques.splice(+d.delUnique, 1); render(); }
        else if (d.delStat) { delete state.stats[d.delStat]; render(); }
        else if (d.delBonus) { const [sid, j] = d.delBonus.split(':'); state.sets[sid].bonuses.splice(+j, 1); render(); }
        else if (d.addBonus) { state.sets[d.addBonus].bonuses.push({ pieces: 2, stat: flatStatIds()[0], val: 1 }); render(); }
        else if (d.delLine) { const [i, j] = d.delLine.split(':'); state.uniques[+i].lines.splice(+j, 1); render(); }
        else if (d.addLine != null) { state.uniques[+d.addLine].lines.push({ stat: statIds()[0], min: 1, max: 1 }); render(); }
        else if (d.copy) { navigator.clipboard.writeText($(d.copy).value); t.textContent = 'Copied!'; setTimeout(() => (t.textContent = 'Copy'), 1000); }
      });

      function updateStat(id, field, t) {
        const s = state.stats[id];
        if (field === 'id') return rekeyStat(id, t.value);
        if (field === 'bandMin' || field === 'bandMax') {
          s.band = s.band || [0, 0];
          s.band[field === 'bandMin' ? 0 : 1] = Number(t.value);
        } else if (['perBudget', 'value'].includes(field)) s[field] = Number(t.value);
        else if (field === 'max') s.max = t.value === '' ? undefined : Number(t.value);
        else s[field] = t.value;
      }

      // rekey helpers preserve insertion order
      function rekeyRecord(rec, oldK, newK, setId) {
        if (!newK || newK === oldK || rec[newK]) return false;
        const out = {};
        for (const [k, v] of Object.entries(rec)) { if (k === oldK) { setId(v, newK); out[newK] = v; } else out[k] = v; }
        return out;
      }
      function rekeySet(oldK, newK) { const r = rekeyRecord(state.sets, oldK, newK, (v, k) => (v.id = k)); if (r) { state.sets = r; render(); } }
      function rekeyStat(oldK, newK) { const r = rekeyRecord(state.stats, oldK, newK, (v, k) => (v.id = k)); if (r) { state.stats = r; render(); } }

      // ---- toolbar --------------------------------------------------------
      $('add').addEventListener('click', () => {
        if (tab === 'bases') state.bases.push({ id: uid('base', baseIds()), name: 'New Item', slot: 'hand1', primary: flatStatIds()[0], pool: [] });
        else if (tab === 'sets') { const id = uid('set', setIds()); state.sets[id] = { id, name: 'New Set', rarity: 'rare', members: [], bonuses: [] }; }
        else if (tab === 'uniques') state.uniques.push({ id: uid('uniq', state.uniques.map((u) => u.id)), name: 'New Unique', slot: 'hand1', base: baseIds()[0] || 'blade', rarity: 'legendary', dropWeight: 1, lines: [] });
        else { const id = uid('stat', statIds()); state.stats[id] = { id, name: 'New Stat', abbr: 'NEW', target: DERIVED_IDS[0], op: 'flat', perBudget: 1, value: 1, kind: 'flat', implemented: false }; }
        render();
      });
      const uid = (p, existing) => { let n = 1, id = `${p}${n}`; while (existing.includes(id)) id = `${p}${++n}`; return id; };
      $('reset').addEventListener('click', () => { if (confirm('Discard edits and reload committed content?')) { state = committed(); render(); } });
      $('regen').addEventListener('click', render);

      render();
    </script>
  </body>
</html>
